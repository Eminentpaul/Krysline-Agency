<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #6e48aa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 4s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 6s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 8s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 10s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 12s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 14s; }
        .particle:nth-child(9) { left: 90%; animation-delay: 1s; }
        .particle:nth-child(10) { left: 5%; animation-delay: 3s; }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Main container */
        .container {
            text-align: center;
            z-index: 1;
            padding: 2rem;
            max-width: 800px;
        }

        /* Glitch effect for 404 */
        .error-code {
            font-size: 12rem;
            font-weight: 900;
            color: #fff;
            position: relative;
            display: inline-block;
            text-shadow: 
                0 0 10px rgba(255,255,255,0.5),
                0 0 20px rgba(255,255,255,0.3),
                0 0 30px rgba(255,255,255,0.2);
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0%, 100% {
                text-shadow: 
                    2px 2px 0px #ff00ff,
                    -2px -2px 0px #00ffff;
            }
            25% {
                text-shadow: 
                    -2px 2px 0px #ff00ff,
                    2px -2px 0px #00ffff;
            }
            50% {
                text-shadow: 
                    2px -2px 0px #ff00ff,
                    -2px 2px 0px #00ffff;
            }
            75% {
                text-shadow: 
                    -2px -2px 0px #ff00ff,
                    2px 2px 0px #00ffff;
            }
        }

        /* Error message */
        .error-title {
            font-size: 2.5rem;
            color: #fff;
            margin: 1rem 0;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .error-message {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        /* Search box */
        .search-box {
            margin: 2rem 0;
            position: relative;
            display: inline-block;
        }

        .search-box input {
            padding: 15px 50px 15px 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
            width: 300px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-box input:focus {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.2);
            width: 350px;
        }

        .search-box button {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: #fff;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .search-box button:hover {
            background: #00ffff;
            transform: translateY(-50%) scale(1.1);
        }

        /* Action buttons */
        .actions {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: 2px solid #fff;
            border-radius: 50px;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: #fff;
            color: #1e3c72;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: #fff;
            color: #1e3c72;
        }

        .btn-primary:hover {
            background: transparent;
            color: #fff;
        }

        /* Lost astronaut illustration */
        .astronaut {
            width: 150px;
            height: 150px;
            margin: 0 auto 2rem;
            position: relative;
            animation: float-astronaut 6s ease-in-out infinite;
        }

        @keyframes float-astronaut {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }

        .astronaut svg {
            width: 100%;
            height: 100%;
            fill: #fff;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        /* Responsive */
        @media (max-width: 768px) {
            .error-code {
                font-size: 8rem;
            }
            .error-title {
                font-size: 1.5rem;
            }
            .search-box input {
                width: 250px;
            }
            .search-box input:focus {
                width: 280px;
            }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- Animated particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Main content -->
    <div class="container">
        <!-- Floating Astronaut SVG -->
        <div class="astronaut">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <circle cx="100" cy="70" r="35" fill="#fff"/>
                <ellipse cx="100" cy="130" rx="45" ry="55" fill="#fff"/>
                <circle cx="100" cy="65" r="25" fill="#1e3c72"/>
                <circle cx="90" cy="60" r="5" fill="#fff"/>
                <circle cx="110" cy="60" r="5" fill="#fff"/>
                <path d="M85 75 Q100 85 115 75" stroke="#fff" stroke-width="3" fill="none"/>
                <rect x="70" y="110" width="60" height="40" rx="10" fill="#00ffff" opacity="0.3"/>
                <circle cx="55" cy="100" r="12" fill="#fff"/>
                <circle cx="145" cy="100" r="12" fill="#fff"/>
                <ellipse cx="75" cy="160" rx="15" ry="25" fill="#fff"/>
                <ellipse cx="125" cy="160" rx="15" ry="25" fill="#fff"/>
            </svg>
        </div>

        <!-- Error code with glitch effect -->
        <div class="error-code">404</div>
        
        <h1 class="error-title">Page Lost in Space</h1>
        
        <p class="error-message">
            Houston, we have a problem! The page you're looking for has drifted into a black hole.<br>
            Don't worry, our astronaut is on a rescue mission.
        </p>

        <!-- Search box -->
        <div class="search-box">
            <input type="text" placeholder="Search for what you need..." id="searchInput">
            <button onclick="handleSearch()" title="Search">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1e3c72" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
            </button>
        </div>

        <!-- Action buttons -->
        <div class="actions">
            <a href="/" class="btn btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Back to Home
            </a>
            <a href="/dashboard" class="btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                Dashboard
            </a>
            <a href="/contact" class="btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                Contact Support
            </a>
        </div>
    </div>

    <script>
        // Search functionality
        function handleSearch() {
            const query = document.getElementById('searchInput').value;
            if (query.trim()) {
                // Redirect to search results
                window.location.href = `/search?q=${encodeURIComponent(query)}`;
            }
        }

        // Enter key triggers search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleSearch();
            }
        });

        // Track mouse movement for subtle parallax effect
        document.addEventListener('mousemove', (e) => {
            const particles = document.querySelectorAll('.particle');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            particles.forEach((particle, index) => {
                const speed = (index + 1) * 0.5;
                const xOffset = (x - 0.5) * speed;
                const yOffset = (y - 0.5) * speed;
                particle.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
            });
        });

        // Console easter egg
        console.log('%c🔭 Lost in space?', 'font-size: 24px; color: #00ffff;');
        console.log('%cThe page you seek is in another galaxy.', 'font-size: 14px; color: #fff;');
    </script>
</body>
</html>
